name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.3.0)'
        required: true
        type: string
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: crates.io
    steps:
      - name: Checkout (auto)
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Verify release tag (auto)
        if: github.event_name == 'workflow_run'
        run: |
          TAG=$(git tag --points-at HEAD | grep '^v' || true)
          if [ -z "$TAG" ]; then
            echo "No release tag at HEAD, skipping publish"
            exit 0
          fi
          echo "Releasing $TAG"

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish paw-core
        run: cargo publish -p paw-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish paw-candle
        run: cargo publish -p paw-candle
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish paw-llamacpp
        run: cargo publish -p paw-llamacpp
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish paw-rs
        run: cargo publish -p paw-rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
