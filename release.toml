# cargo-release workspace configuration
# Usage: cargo release version [patch|minor|major] --execute

shared-version = true
consolidate-commits = true
pre-release-commit-message = "chore: release {{version}}"
tag-name = "v{{version}}"
tag-message = "v{{version}}"
push = false
publish = false
disable-publish = true
exclude = ["paw-mistralrs"]

[hooks.pre-release]
# Verify CI assets exist (no untracked files)
verify-assets = ["cargo build --workspace --exclude paw-mistralrs"]
